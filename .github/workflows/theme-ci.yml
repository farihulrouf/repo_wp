name: Theme CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout repo
    - name: Checkout code
      uses: actions/checkout@v3

    # ⚙️ Setup PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        tools: composer

    # 📦 Install PHPCS + WordPress Coding Standards (compatible versions)
    - name: Install PHPCS + WPCS
      run: |
        composer global require "squizlabs/php_codesniffer:^3.13"
        composer global require "wp-coding-standards/wpcs:^3.3"
        ~/.composer/vendor/bin/phpcs --config-set installed_paths ~/.composer/vendor/wp-coding-standards/wpcs

    # 🔍 Run WordPress Coding Standard check
    - name: Run PHPCS (WordPress Standard)
      run: |
        ~/.composer/vendor/bin/phpcs --standard=WordPress .

    # 🧪 Basic PHP Syntax Check (extra safety)
    - name: PHP Syntax Check
      run: |
        find . -name "*.php" -exec php -l {} \;

    # 🎨 Basic CSS Check (optional simple check)
    - name: Check CSS files
      run: |
        echo "Checking CSS files..."
        find . -name "*.css" -exec wc -l {} \;

  # 🚀 OPTIONAL: AUTO DEPLOY VIA FTP (InfinityFree compatible)
  deploy:
    needs: quality-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /htdocs/wp-content/themes/estatein-theme/