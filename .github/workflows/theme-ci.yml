name: Theme CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout repository
    - name: Checkout code
      uses: actions/checkout@v3

    # ⚙️ Setup PHP + Composer
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        tools: composer

    # 🔐 Allow Composer plugin (IMPORTANT FIX)
    - name: Allow Composer Plugins
      run: |
        composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true

    # 📦 Install PHPCS + WordPress Coding Standards
    - name: Install PHPCS + WPCS
      run: |
        composer global require "squizlabs/php_codesniffer:^3.13"
        composer global require "wp-coding-standards/wpcs:^3.3"

    # 🔧 Auto fix coding standard (optional but keren)
    - name: Auto Fix Code Style
      run: |
        ~/.composer/vendor/bin/phpcbf --standard=WordPress . || true

    # 🔍 Run PHPCS (ONLY PHP → biar gak error CSS)
    - name: Run PHPCS (WordPress Standard)
      run: |
        ~/.composer/vendor/bin/phpcs --standard=WordPress --extensions=php .

    # 🧪 Extra safety: PHP syntax check
    - name: PHP Syntax Check
      run: |
        find . -name "*.php" -exec php -l {} \;

  # 🚀 OPTIONAL: Auto Deploy (InfinityFree compatible)
  deploy:
    needs: quality-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /htdocs/wp-content/themes/estatein-theme/