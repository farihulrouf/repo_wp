name: Theme CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # ⚙️ Setup PHP + Composer
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        tools: composer

    # 🔐 FIX: Allow Composer Plugin (IMPORTANT)
    - name: Allow Composer Plugins
      run: |
        composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true

    # 📦 Install PHPCS + WPCS (compatible)
    - name: Install PHPCS + WPCS
      run: |
        composer global require "squizlabs/php_codesniffer:^3.13"
        composer global require "wp-coding-standards/wpcs:^3.3"

    # 🔍 Run WordPress Coding Standard
    - name: Run PHPCS (WordPress Standard)
      run: |
        ~/.composer/vendor/bin/phpcs --standard=WordPress .

    # 🧪 PHP Syntax Check
    - name: PHP Syntax Check
      run: |
        find . -name "*.php" -exec php -l {} \;

    # 🎨 CSS Check
    - name: Check CSS
      run: |
        echo "Checking CSS files..."
        find . -name "*.css" -exec wc -l {} \;

  # 🚀 Deploy (optional)
  deploy:
    needs: quality-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /htdocs/wp-content/themes/estatein-theme/